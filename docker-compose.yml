services:
  postgres:
    image: postgres:16-alpine
    container_name: arbix-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: arbix
      POSTGRES_PASSWORD: arbix
      POSTGRES_DB: arbix
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arbix -d arbix"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: arbix-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: arbix-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://arbix:arbix@postgres:5432/arbix?schema=public
      MARKET_MODE: DEMO
      ENABLE_BINANCE: "true"
      ENABLE_KRAKEN: "true"
      ENABLE_OKX: "true"
      ENABLE_COINBASE: "false"
      FRONTEND_URL: http://localhost:3001
    ports:
      - "4000:4000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: arbix-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_WS_URL: http://localhost:4000
    ports:
      - "3001:3001"

volumes:
  postgres-data:
