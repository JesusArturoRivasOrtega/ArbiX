name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build -w @arbix/shared

      - name: Build config package
        run: npm run build -w @arbix/config

      - name: Generate Prisma client
        run: npm run prisma:generate -w @arbix/api

      - name: Type-check shared package
        run: npx tsc --noEmit
        working-directory: packages/shared

      - name: Type-check config package
        run: npx tsc --noEmit
        working-directory: packages/config

      - name: Type-check API
        run: npx tsc --noEmit
        working-directory: apps/api

      - name: Type-check web
        run: npx tsc --noEmit
        working-directory: apps/web

      - name: Run API tests
        run: npm test -w @arbix/api

      - name: Run web unit tests
        run: npm test -w @arbix/web

      - name: Lint web
        run: npm run lint -w @arbix/web

      - name: Build API
        run: npm run build -w @arbix/api

      - name: Build web
        run: npm run build -w @arbix/web
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000
          NEXT_PUBLIC_WS_URL: http://localhost:4000
